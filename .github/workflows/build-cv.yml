name: Build CV

# Compiles tex/cv.tex (XeLaTeX + biber, via latexmk) and pushes the
# resulting PDF to the orphan `pdf` branch (no shared history with main),
# so it always has a stable URL:
# https://raw.githubusercontent.com/avivajpeyi/cv/pdf/cv.pdf

permissions:
  contents: write

on:
  push:
    branches: ['main']
    paths: ['tex/**']
  workflow_dispatch:

concurrency:
  group: build-cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: tex
          latexmk_use_xelatex: true

      - name: Push compiled PDF to orphan pdf branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir /tmp/pdf-branch
          cp tex/cv.pdf /tmp/pdf-branch/cv.pdf
          git checkout --orphan pdf
          git rm -rf . > /dev/null
          cp /tmp/pdf-branch/cv.pdf cv.pdf
          git add cv.pdf
          git commit -m "chore: rebuild compiled CV PDF [skip ci]"
          git push origin pdf --force
