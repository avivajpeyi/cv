name: Build CV

# Compiles tex/cv.tex (XeLaTeX + biber, via latexmk) and commits the
# resulting PDF back to the repo at cv.pdf, so it always has a stable URL:
# https://raw.githubusercontent.com/avivajpeyi/cv/main/cv.pdf

permissions:
  contents: write

on:
  push:
    branches: ['main']
    paths: ['tex/**']
  workflow_dispatch:

concurrency:
  group: build-cv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: tex
          latexmk_use_xelatex: true

      - name: Commit compiled PDF
        run: |
          cp tex/cv.pdf cv.pdf
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild compiled CV PDF [skip ci]"
            git push
          else
            echo "PDF unchanged, nothing to commit"
          fi
